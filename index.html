<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Windows 11 BSOD Simulation</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: "Segoe UI", sans-serif;
    }

    body{
        background:#0078D7;
        color:white;
        width:100vw;
        height:100vh;
        overflow:hidden;
        display:flex;
        justify-content:center;
        align-items:center;
    }

    .bsod{
        width:100%;
        max-width:1100px;
        padding:60px;
    }

    .sad-face{
        font-size:120px;
        font-weight:300;
        margin-bottom:20px;
    }

    .main-text{
        font-size:42px;
        line-height:1.3;
        max-width:900px;
        margin-bottom:40px;
        font-weight:300;
    }

    .progress{
        font-size:28px;
        margin-bottom:40px;
    }

    .bottom{
        display:flex;
        align-items:flex-start;
        gap:30px;
    }

    .qr{
        width:140px;
        height:140px;
        background:white;
        padding:8px;
    }

    .qr img{
        width:100%;
        height:100%;
    }

    .info{
        font-size:18px;
        line-height:1.7;
        max-width:700px;
    }

    .code{
        margin-top:10px;
        font-weight:bold;
    }

    @media(max-width:768px){
        .main-text{
            font-size:28px;
        }

        .sad-face{
            font-size:90px;
        }

        .progress{
            font-size:22px;
        }

        .bottom{
            flex-direction:column;
        }
    }
</style>
</head>

<body>

<div class="bsod">
    
    <div class="sad-face">:(</div>

    <div class="main-text">
        Your device ran into a problem and needs to restart. 
        We're just collecting some error info, and then we'll restart for you.
    </div>

    <div class="progress" id="percent">
        0% complete
    </div>

    <div class="bottom">

        <div class="qr">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://www.microsoft.com/stopcode" alt="QR">
        </div>

        <div class="info">
            For more information about this issue and possible fixes, visit:<br>
            https://www.windows.com/stopcode

            <div class="code">
                Stop code: CRITICAL_PROCESS_DIED
            </div>
        </div>

    </div>
</div>

<script>
    let percent = 0;
    const el = document.getElementById("percent");

    const interval = setInterval(() => {
        percent++;

        el.textContent = percent + "% complete";

        if(percent >= 100){
            clearInterval(interval);

            setTimeout(() => {
                location.reload();
            }, 2000);
        }
    }, 120);
</script>

</body>
</html>
