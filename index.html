<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Windows 11 BSOD Simulation</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: "Segoe UI", sans-serif;
        cursor: none; /* Sembunyikan mouse */
    }

    html, body{
        width:100%;
        height:100%;
        overflow:hidden;
        background:#0078D7;
        color:white;
    }

    body{
        display:flex;
        justify-content:center;
        align-items:center;
    }

    .bsod{
        width:100%;
        max-width:1100px;
        padding:60px;
    }

    .sad-face{
        font-size:120px;
        font-weight:300;
        margin-bottom:20px;
    }

    .main-text{
        font-size:42px;
        line-height:1.3;
        max-width:900px;
        margin-bottom:40px;
        font-weight:300;
    }

    .progress{
        font-size:28px;
        margin-bottom:40px;
    }

    .bottom{
        display:flex;
        align-items:flex-start;
        gap:30px;
    }

    .qr{
        width:140px;
        height:140px;
        background:white;
        padding:8px;
    }

    .qr img{
        width:100%;
        height:100%;
    }

    .info{
        font-size:18px;
        line-height:1.7;
        max-width:700px;
    }

    .code{
        margin-top:10px;
        font-weight:bold;
    }

    .fullscreen-btn{
        position:fixed;
        top:20px;
        right:20px;
        background:white;
        color:#0078D7;
        border:none;
        padding:10px 18px;
        border-radius:8px;
        font-size:14px;
        font-weight:bold;
        cursor:pointer;
        z-index:9999;
    }

    @media(max-width:768px){
        .main-text{
            font-size:28px;
        }

        .sad-face{
            font-size:90px;
        }

        .progress{
            font-size:22px;
        }

        .bottom{
            flex-direction:column;
        }
    }
</style>
</head>

<body>

<button class="fullscreen-btn" onclick="goFullscreen()">
    FULLSCREEN
</button>

<div class="bsod">

    <div class="sad-face">:(</div>

    <div class="main-text">
        Your device ran into a problem and needs to restart.
        We're just collecting some error info, and then we'll restart for you.
    </div>

    <div class="progress" id="percent">
        0% complete
    </div>

    <div class="bottom">

        <div class="qr">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://www.microsoft.com/stopcode" alt="QR">
        </div>

        <div class="info">
            For more information about this issue and possible fixes, visit:<br>
            https://www.windows.com/stopcode

            <div class="code">
                Stop code: CRITICAL_PROCESS_DIED
            </div>
        </div>

    </div>
</div>

<script>
    // Progress animation
    let percent = 0;
    const el = document.getElementById("percent");

    const interval = setInterval(() => {
        percent++;

        el.textContent = percent + "% complete";

        if(percent >= 100){
            clearInterval(interval);

            setTimeout(() => {
                location.reload();
            }, 2000);
        }
    }, 120);

    // Fullscreen
    function goFullscreen(){
        const elem = document.documentElement;

        if(elem.requestFullscreen){
            elem.requestFullscreen();
        }else if(elem.webkitRequestFullscreen){
            elem.webkitRequestFullscreen();
        }else if(elem.msRequestFullscreen){
            elem.msRequestFullscreen();
        }
    }

    // Auto fullscreen saat halaman dibuka
    window.onload = () => {
        goFullscreen();
    };

    // Nonaktif klik kanan
    document.addEventListener('contextmenu', e => e.preventDefault());

    // Blok tombol tertentu
    document.addEventListener('keydown', function(e){

        // F11, ESC, CTRL+W, ALT+TAB simulasi
        if(
            e.key === "F11" ||
            e.key === "Escape" ||
            (e.ctrlKey && e.key.toLowerCase() === "w")
        ){
            e.preventDefault();
        }
    });
</script>

</body>
</html>
